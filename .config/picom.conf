###► Pɪᴄᴏᴍ Cᴏɴꜰɪɢ (Pʀᴏ Eᴅɪᴛɪᴏɴ)
####################################
###► Cᴏʀɴᴇʀꜱ & Bᴏʀᴅᴇʀꜱ
####################################
corner-radius = 12;
rounded-corners-exclude = [
  "class_g = 'Awesome'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "window_type = 'menu'",
  "window_type = 'tooltip'",
  "_NET_WM_WINDOW_TYPE@:a *= 'SPLASH'"
];

####################################
###► Sʜᴀᴅᴏᴡꜱ
####################################
shadow = true;
shadow-radius = 15;
shadow-opacity = 0.75;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#2E3440";
shadow-exclude = [
  "class_g = 'Peek'",
  "class_g = 'Slop'",
  "name = 'Notification'",
  "window_type = 'dropdown_menu'",
  "window_type = 'combo'",
  "_GTK_FRAME_EXTENTS@:c"
];

####################################
###► Tʀᴀɴꜱᴘᴀʀᴇɴᴄʏ & Bʟᴜʀ
####################################
active-opacity = 1.0;
inactive-opacity = 0.95;
frame-opacity = 1.0;

blur: {
  method = "dual_kawase";
  strength = 8;
  deviation = 1.0;
  kernel = "3x3box";
  background = true;
  background-frame = true;
  background-fixed = true;
}

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_NET_WM_WINDOW_TYPE@:a *= 'SPLASH'"
];

####################################
###► Aɴɪᴍᴀᴛɪᴏɴꜱ
####################################
animations = true;
animation-window-mass = 0.5;
animation-dampening = 16;
animation-clamping = true;
animation-for-open-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";

####################################
###► Pᴇʀꜰᴏʀᴍᴀɴᴄᴇ
####################################
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
vsync = true;
detect-client-opacity = true;
xrender-sync-fence = true;

####################################
###► Aᴅᴠᴀɴᴄᴇᴅ Tᴡᴇᴀᴋꜱ
####################################
dbe = false;
unredir-if-possible = true;
unredir-if-possible-delay = 50;
focus-exclude = [
  "class_g = 'Steam'",
  "name = 'rofi'",
  "window_type = 'utility'"
];

wintypes: {
  tooltip = { fade = true; shadow = false; opacity = 0.9; focus = true; };
  menu = { shadow = false; };
  dropdown_menu = { shadow = false; };
  popup_menu = { shadow = false; };
  utility = { shadow = false; };
  dock = { shadow = false; blur-background = false; };
  normal = { shadow = true; blur-background = true; };
}

####################################
###► Exᴘᴇʀɪᴍᴇɴᴛᴀʟ
####################################
# Enable for tear-free experience:
# xrender-sync = true;
# xrender-sync-fence = true;

# For multi-GPU systems:
# glx-use-copysubbuffermesa = true;
